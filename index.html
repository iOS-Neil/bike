<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC2026 Predictor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    const firebaseConfig = {
        apiKey: "AIzaSyC2Sr5IcLU9p2HopvBvOFlsBRGZtB1y9NE",
        authDomain: "pcc2026wc.firebaseapp.com",
        databaseURL: "https://pcc2026wc-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "pcc2026wc",
        storageBucket: "pcc2026wc.firebasestorage.app",
        messagingSenderId: "435446315061",
        appId: "1:435446315061:web:ab2b76edfb08e8ee6b997c"
    };

    // PASTE YOUR UID HERE:
    const ADMIN_UID = "mJFQl94QpgMzbfi07u2EStaxDJZ2"; 
    const appId = "my-world-cup-predictor-2026";

    const COUNTRY_FLAGS = {
        "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czech Republic": "🇨🇿",
        "Canada": "🇨🇦", "Bosnia": "🇧🇦", "Qatar": "🇶🇦", "Switzerland": "🇨🇭",
        "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Haiti": "🇭🇹", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "USA": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turkey": "🇹🇷",
        "Germany": "🇩🇪", "Curaçao": "🇨🇼", "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨",
        "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳",
        "Belgium": "🇧🇪", "Egypt": "🇪🇬", "Iran": "🇮🇷", "New Zealand": "🇳🇿",
        "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾"
    };

    const GROUPS_TEAMS = {
        A: ["Mexico", "South Africa", "South Korea", "Czech Republic"],
        B: ["Canada", "Bosnia", "Qatar", "Switzerland"],
        C: ["Brazil", "Morocco", "Haiti", "Scotland"],
        D: ["USA", "Paraguay", "Australia", "Turkey"],
        E: ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
        F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
        G: ["Belgium", "Egypt", "Iran", "New Zealand"],
        H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function App() {
        const [user, setUser] = React.useState(null);
        const [authLoading, setAuthLoading] = React.useState(true);
        const [authView, setAuthView] = React.useState('login');
        const [email, setEmail] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [matches, setMatches] = React.useState([]);
        const [predictions, setPredictions] = React.useState({});
        const [adminMode, setAdminMode] = React.useState(false);
        const [activeGroup, setActiveGroup] = React.useState('A');

        React.useEffect(() => {
            auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); });
            db.ref(`artifacts/${appId}/public/data/matches`).on('value', snap => setMatches(Object.values(snap.val() || {})));
            db.ref(`artifacts/${appId}/public/data/predictions`).on('value', snap => setPredictions(snap.val() || {}));
        }, []);

        const seedMatches = () => {
            const matches = {};
            Object.keys(GROUPS_TEAMS).forEach(g => {
                const teams = GROUPS_TEAMS[g];
                const groupMatches = [
                    { home: teams[0], away: teams[1], date: "June 11" },
                    { home: teams[2], away: teams[3], date: "June 14" }, 
                    { home: teams[0], away: teams[2], date: "June 15" },
                    { home: teams[1], away: teams[3], date: "June 16" },
                    { home: teams[3], away: teams[0], date: "June 20" },
                    { home: teams[1], away: teams[2], date: "June 21" }
                ];
                groupMatches.forEach((m, i) => matches[`g_${g}_${i}`] = { ...m, id: `g_${g}_${i}`, group: g, homeScore: 0, awayScore: 0, completed: false });
            });
            db.ref(`artifacts/${appId}/public/data/matches`).set(matches);
        };

        const updateMatch = (id, field, val) => db.ref(`artifacts/${appId}/public/data/matches/${id}`).update({ [field]: val });
        const updatePrediction = (matchId, field, val) => {
            const predId = `${user.uid}_${matchId}`;
            const current = predictions[predId] || { home: 0, away: 0 };
            db.ref(`artifacts/${appId}/public/data/predictions/${predId}`).set({ ...current, [field]: val });
        };

        const handleAuth = async (e) => {
            e.preventDefault();
            try {
                if (authView === 'login') await auth.signInWithEmailAndPassword(email, password);
                else await auth.createUserWithEmailAndPassword(email, password);
            } catch (err) { alert(err.message); }
        };

        if (authLoading) return <div className="p-4">Loading...</div>;
        if (!user) return (
            <div className="max-w-md mx-auto p-10 glass-card rounded-3xl mt-20">
                <h2 className="text-2xl font-black mb-6 text-emerald-400">{authView === 'login' ? 'LOGIN' : 'REGISTER'}</h2>
                <form onSubmit={handleAuth} className="space-y-4">
                    <input className="w-full bg-slate-800 p-3 rounded-xl" placeholder="Email" onChange={e => setEmail(e.target.value)} />
                    <input className="w-full bg-slate-800 p-3 rounded-xl" type="password" placeholder="Password" onChange={e => setPassword(e.target.value)} />
                    <button className="w-full bg-emerald-500 p-3 rounded-xl font-bold">SUBMIT</button>
                </form>
                <p className="mt-4 text-xs text-slate-500 cursor-pointer underline" onClick={() => setAuthView(authView === 'login' ? 'reg' : 'login')}>Toggle Login/Register</p>
            </div>
        );

        return (
            <div className="max-w-4xl mx-auto p-4">
                <header className="flex justify-between items-center glass-card p-6 rounded-3xl mb-6">
                    <div>
                        <h1 className="font-black text-emerald-400">WC PREDICTOR 2026</h1>
                        <p className="text-[10px] text-slate-500">YOUR UID: {user.uid}</p>
                    </div>
                    <div className="flex gap-4">
                        {user?.uid === ADMIN_UID && <button onClick={() => setAdminMode(!adminMode)} className="bg-amber-500 text-black px-4 py-2 rounded-xl font-bold">⚙️</button>}
                        <button onClick={() => auth.signOut()} className="text-sm font-bold">Logout</button>
                    </div>
                </header>

                {adminMode && (
                    <div className="glass-card p-6 mb-6 rounded-3xl space-y-4">
                        <button onClick={seedMatches} className="bg-red-500 text-white px-4 py-2 rounded-xl text-sm w-full font-bold">Reset All Matches (Use after code update)</button>
                    </div>
                )}

                <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
                    {Object.keys(GROUPS_TEAMS).map(g => (
                        <button key={g} onClick={() => setActiveGroup(g)} className={`px-4 py-2 rounded-xl font-bold text-sm whitespace-nowrap ${activeGroup === g ? 'bg-emerald-500 text-black' : 'bg-slate-800'}`}>Group {g}</button>
                    ))}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {matches.filter(m => m.group === activeGroup).map(m => {
                        const pred = predictions[`${user.uid}_${m.id}`] || { home: 0, away: 0 };
                        return (
                            <div key={m.id} className="glass-card p-4 rounded-2xl">
                                <p className="text-xs font-bold text-slate-400 mb-4">{m.date} - Group {m.group}</p>
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-2"><span className="text-2xl">{COUNTRY_FLAGS[m.home]}</span><span className="font-bold">{m.home}</span></div>
                                    <span className="text-xl font-bold">{m.homeScore} : {m.awayScore}</span>
                                    <div className="flex items-center gap-2"><span className="font-bold">{m.away}</span><span className="text-2xl">{COUNTRY_FLAGS[m.away]}</span></div>
                                </div>
                                <div className="bg-slate-950 p-3 rounded-xl flex items-center justify-between">
                                    <span className="text-xs font-bold text-slate-500">YOUR PREDICTION</span>
                                    <div className="flex items-center gap-4">
                                        <div className="flex gap-2 items-center"><button onClick={() => updatePrediction(m.id, 'home', Math.max(0, pred.home - 1))} className="bg-slate-800 px-2 rounded">-</button><span>{pred.home}</span><button onClick={() => updatePrediction(m.id, 'home', pred.home + 1)} className="bg-slate-800 px-2 rounded">+</button></div>
                                        <div className="flex gap-2 items-center"><button onClick={() => updatePrediction(m.id, 'away', Math.max(0, pred.away - 1))} className="bg-slate-800 px-2 rounded">-</button><span>{pred.away}</span><button onClick={() => updatePrediction(m.id, 'away', pred.away + 1)} className="bg-slate-800 px-2 rounded">+</button></div>
                                    </div>
                                </div>
                                {adminMode && (
                                    <div className="flex gap-2 mt-4 pt-4 border-t border-slate-700">
                                        <button onClick={() => updateMatch(m.id, 'homeScore', m.homeScore + 1)} className="bg-amber-600 px-2 rounded text-xs">Home +</button>
                                        <button onClick={() => updateMatch(m.id, 'awayScore', m.awayScore + 1)} className="bg-amber-600 px-2 rounded text-xs">Away +</button>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>

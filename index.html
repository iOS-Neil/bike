<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC2026 Predictor Pro | Holiday Mode</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Legacy SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .live-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .match-list { max-height: 70vh; overflow-y: auto; padding-right: 4px; }
        .match-list::-webkit-scrollbar { width: 4px; }
        .match-list::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const firebaseConfig = {
        apiKey: "AIzaSyC2Sr5IcLU9p2HopvBvOFlsBRGZtB1y9NE",
        authDomain: "pcc2026wc.firebaseapp.com",
        databaseURL: "https://pcc2026wc-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "pcc2026wc",
        storageBucket: "pcc2026wc.firebasestorage.app",
        messagingSenderId: "435446315061",
        appId: "1:435446315061:web:ab2b76edfb08e8ee6b997c"
    };

    const API_TOKEN = "5c19fe248b844cf6b7673905997c9ad4";
    const ADMIN_UID = "mJFQl94QpgMzbfi07u2EStaxDJZ2"; 
    const appId = "my-world-cup-predictor-2026";

    const COUNTRY_FLAGS = {
        "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czech Republic": "🇨🇿",
        "Canada": "🇨🇦", "Bosnia": "🇧🇦", "Qatar": "🇶🇦", "Switzerland": "🇨🇭",
        "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Haiti": "🇭🇹", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "USA": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turkey": "🇹🇷",
        "Germany": "🇩🇪", "Curaçao": "🇨🇼", "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨",
        "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳",
        "Belgium": "🇧🇪", "Egypt": "🇪🇬", "Iran": "🇮🇷", "New Zealand": "🇳🇿",
        "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾"
    };

    const GROUPS_TEAMS = {
        A: ["Mexico", "South Africa", "South Korea", "Czech Republic"],
        B: ["Canada", "Bosnia", "Qatar", "Switzerland"],
        C: ["Brazil", "Morocco", "Haiti", "Scotland"],
        D: ["USA", "Paraguay", "Australia", "Turkey"],
        E: ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
        F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
        G: ["Belgium", "Egypt", "Iran", "New Zealand"],
        H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function App() {
        const [user, setUser] = React.useState(null);
        const [authLoading, setAuthLoading] = React.useState(true);
        const [authView, setAuthView] = React.useState('none');
        const [activeTab, setActiveTab] = React.useState('predictions');
        const [activeGroup, setActiveGroup] = React.useState('A');
        const [matches, setMatches] = React.useState([]);
        const [predictions, setPredictions] = React.useState([]);
        const [users, setUsers] = React.useState([]);
        const [adminMode, setAdminMode] = React.useState(false);
        const [syncStatus, setSyncStatus] = React.useState('Idle');

        React.useEffect(() => {
            auth.onAuthStateChanged(u => {
                setUser(u);
                setAuthLoading(false);
                if (!u) setAuthView('login');
            });

            db.ref(`artifacts/${appId}/public/data/matches`).on('value', snap => {
                const data = snap.val() || {};
                setMatches(Object.keys(data).map(k => ({ ...data[k], id: k })));
            });

            db.ref(`artifacts/${appId}/public/data/predictions`).on('value', snap => {
                const data = snap.val() || {};
                setPredictions(Object.keys(data).map(k => ({ ...data[k], id: k })));
            });

            db.ref(`artifacts/${appId}/public/data/users`).on('value', snap => {
                const data = snap.val() || {};
                setUsers(Object.values(data));
            });
        }, []);

        const syncScoresFromAPI = async () => {
            if (!API_TOKEN) return;
            setSyncStatus('🛰️ Connecting to API...');
            
            try {
                const apiUrl = 'https://api.football-data.org/v4/competitions/WC/matches';
                const proxiedUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                
                const response = await fetch(proxiedUrl);
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);
                
                if (data.errorCode || data.message) {
                    setSyncStatus(`❌ API Error: ${data.message}`);
                    return;
                }

                if (data.matches) {
                    const updates = {};
                    let count = 0;
                    data.matches.forEach(apiMatch => {
                        const dbMatch = matches.find(m => 
                            m.home === (apiMatch.homeTeam.shortName || apiMatch.homeTeam.name) &&
                            m.away === (apiMatch.awayTeam.shortName || apiMatch.awayTeam.name)
                        );

                        if (dbMatch) {
                            const newStatus = apiMatch.status === 'FINISHED' ? 'FINISHED' : (['IN_PLAY', 'PAUSED'].includes(apiMatch.status) ? 'LIVE' : 'UPCOMING');
                            const hScore = apiMatch.score.fullTime.home ?? 0;
                            const aScore = apiMatch.score.fullTime.away ?? 0;

                            if (dbMatch.homeScore !== hScore || dbMatch.awayScore !== aScore || dbMatch.status !== newStatus) {
                                updates[`artifacts/${appId}/public/data/matches/${dbMatch.id}`] = {
                                    ...dbMatch,
                                    homeScore: hScore,
                                    awayScore: aScore,
                                    status: newStatus,
                                    completed: newStatus === 'FINISHED',
                                    minute: apiMatch.minute || ''
                                };
                                count++;
                            }
                        }
                    });

                    if (count > 0) {
                        await db.ref().update(updates);
                        setSyncStatus(`✅ Synced ${count} matches!`);
                    } else {
                        setSyncStatus('💤 No live changes detected');
                    }
                }
            } catch (err) {
                setSyncStatus('❌ Proxy/Network Failure');
            }
        };

        const updateMatchScore = (matchId, team, change) => {
            const m = matches.find(match => match.id === matchId);
            if (!m) return;
            let h = parseInt(m.homeScore) || 0;
            let a = parseInt(m.awayScore) || 0;
            if (team === 'home') h = Math.max(0, h + change);
            else a = Math.max(0, a + change);

            db.ref(`artifacts/${appId}/public/data/matches/${matchId}`).update({
                homeScore: h, awayScore: a, status: 'FINISHED', completed: true
            });
        };

        const updatePrediction = (matchId, team, change) => {
            if (!user) return;
            const predId = `${user.uid}_${matchId}`;
            const existing = predictions.find(p => p.id === predId) || { homePredict: 0, awayPredict: 0 };
            let h = parseInt(existing.homePredict) || 0;
            let a = parseInt(existing.awayPredict) || 0;
            if (team === 'home') h = Math.max(0, h + change);
            else a = Math.max(0, a + change);

            db.ref(`artifacts/${appId}/public/data/predictions/${predId}`).set({
                userId: user.uid, matchId, homePredict: h, awayPredict: a
            });
        };

        const leaderboard = React.useMemo(() => {
            return users
                .filter(u => !u.isAnonymous) 
                .map(u => {
                    let pts = 0;
                    predictions.filter(p => p.userId === u.uid).forEach(p => {
                        const m = matches.find(match => match.id === p.matchId);
                        if (m && m.completed) {
                            const actH = parseInt(m.homeScore);
                            const actA = parseInt(m.awayScore);
                            const prH = parseInt(p.homePredict);
                            const prA = parseInt(p.awayPredict);
                            if (actH === prH && actA === prA) pts += 5; 
                            else if ((actH > actA && prH > prA) || (actH < actA && prH < prA) || (actH === actA && prH === prA)) pts += 2; 
                        }
                    });
                    return { ...u, points: pts };
                }).sort((a, b) => b.points - a.points);
        }, [users, matches, predictions]);

        if (authLoading) return <div className="h-screen flex items-center justify-center text-emerald-500 font-black animate-pulse">CONNECTING...</div>;

        return (
            <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-6 animate-in">
                
                {/* HEADER */}
                <header className="glass-card p-6 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/20">🏆</div>
                        <div>
                            <h1 className="text-xl font-black text-emerald-400 uppercase tracking-tighter">WC Predictor 2026</h1>
                            {user?.uid === ADMIN_UID && (
                                <div className="flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{syncStatus}</p>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <div className="flex items-center gap-3">
                        {user && !user.isAnonymous ? (
                            <>
                                <div className="bg-slate-900 border border-slate-800 px-4 py-2 rounded-2xl text-center">
                                    <p className="text-[9px] font-black text-slate-500 uppercase">Points</p>
                                    <p className="text-emerald-400 font-black">{leaderboard.find(l => l.uid === user.uid)?.points || 0}</p>
                                </div>
                                {user.uid === ADMIN_UID && (
                                    <button onClick={() => setAdminMode(!adminMode)} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-all ${adminMode ? 'bg-amber-500 text-slate-900 border-amber-500' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>⚙️</button>
                                )}
                                <button onClick={() => auth.signOut()} className="text-[10px] text-slate-500 font-black hover:text-red-400 transition-colors uppercase">Logout</button>
                            </>
                        ) : (
                            <button onClick={() => setAuthView('login')} className="bg-emerald-500 text-slate-950 px-6 py-2 rounded-xl font-black text-xs uppercase">Join League</button>
                        )}
                    </div>
                </header>

                {/* ADMIN TOOLS */}
                {adminMode && (
                    <div className="bg-amber-500/10 border border-amber-500/20 p-6 rounded-[2rem] flex flex-col md:flex-row items-center gap-6 animate-in">
                         <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-slate-900 font-black text-xs">A</div>
                            <div className="text-xs font-black text-amber-500 uppercase tracking-widest">Holiday Admin Hub</div>
                         </div>
                         <div className="flex flex-wrap gap-3">
                            <button onClick={syncScoresFromAPI} className="bg-amber-500 text-slate-900 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-amber-500/20 hover:scale-105 transition-all">Attempt API Sync</button>
                            <p className="text-[9px] text-amber-500/70 font-bold max-w-[250px] leading-relaxed">Update scores via API or use the <span className="text-amber-400 underline">+/- Buttons</span> on each card for manual holiday overrides.</p>
                         </div>
                    </div>
                )}

                {/* MAIN CONTENT */}
                {authView !== 'none' ? (
                    <div className="glass-card p-12 rounded-[3rem] text-center space-y-6 max-w-sm mx-auto">
                        <h2 className="text-2xl font-black uppercase tracking-tighter text-emerald-400">Welcome Back</h2>
                        <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Sign in to manage predictions</p>
                        <form onSubmit={async (e) => {
                            e.preventDefault();
                            const email = e.target.email.value;
                            const pass = e.target.password.value;
                            try {
                                if (authView === 'register') {
                                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                                    await res.user.updateProfile({ displayName: e.target.display.value });
                                    await db.ref(`artifacts/${appId}/public/data/users/${res.user.uid}`).set({ uid: res.user.uid, displayName: e.target.display.value, isAnonymous: false });
                                } else {
                                    await auth.signInWithEmailAndPassword(email, pass);
                                }
                                setAuthView('none');
                            } catch (err) { console.error(err); }
                        }} className="space-y-3 text-slate-950">
                             {authView === 'register' && <input name="display" type="text" placeholder="Your Name" className="w-full rounded-xl px-4 py-3 text-sm font-bold border border-slate-200 outline-none focus:ring-2 ring-emerald-500" required />}
                             <input name="email" type="email" placeholder="Email Address" className="w-full rounded-xl px-4 py-3 text-sm font-bold border border-slate-200 outline-none focus:ring-2 ring-emerald-500" required />
                             <input name="password" type="password" placeholder="Password" className="w-full rounded-xl px-4 py-3 text-sm font-bold border border-slate-200 outline-none focus:ring-2 ring-emerald-500" required />
                             <button className="w-full bg-emerald-500 text-slate-950 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-emerald-500/20">Enter Predictor</button>
                             <button type="button" onClick={() => setAuthView(authView === 'login' ? 'register' : 'login')} className="text-[10px] text-slate-500 uppercase font-black hover:text-emerald-400 transition-colors">{authView === 'login' ? 'New here? Register' : 'Have account? Login'}</button>
                        </form>
                    </div>
                ) : (
                    <div className="space-y-6">
                        <div className="bg-slate-900 p-1.5 rounded-2xl flex border border-slate-800 shadow-xl">
                            <button onClick={() => setActiveTab('predictions')} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === 'predictions' ? 'bg-emerald-500 text-slate-950' : 'text-slate-500 hover:text-slate-300'}`}>MATCHES</button>
                            <button onClick={() => setActiveTab('leaderboard')} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === 'leaderboard' ? 'bg-emerald-500 text-slate-950' : 'text-slate-500 hover:text-slate-300'}`}>LEADERBOARD</button>
                        </div>

                        {activeTab === 'predictions' ? (
                            <div className="space-y-6">
                                <div className="flex overflow-x-auto gap-2 pb-2 scrollbar-hide justify-center">
                                    {Object.keys(GROUPS_TEAMS).map(g => (
                                        <button key={g} onClick={() => setActiveGroup(g)} className={`px-5 py-2.5 text-xs font-black rounded-xl border transition-all ${activeGroup === g ? 'bg-slate-800 text-emerald-400 border-emerald-500/40 shadow-inner' : 'bg-slate-900/50 text-slate-600 border-transparent hover:border-slate-700'}`}>GROUP {g}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 match-list">
                                    {matches.filter(m => m.group === activeGroup).map(m => {
                                        const p = predictions.find(pred => pred.matchId === m.id && pred.userId === user?.uid) || { homePredict: 0, awayPredict: 0 };
                                        const isLive = m.status === 'LIVE';
                                        return (
                                            <div key={m.id} className={`glass-card p-6 rounded-[2.5rem] border-slate-800 relative transition-all hover:border-slate-700 ${isLive ? 'border-red-500/50 shadow-lg shadow-red-500/10 bg-red-500/5' : ''}`}>
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">{m.date}</span>
                                                    {m.completed ? (
                                                        <span className="bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-[9px] font-black uppercase border border-slate-700">🏁 FT</span>
                                                    ) : isLive ? (
                                                        <span className="bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-[9px] font-black uppercase live-pulse border border-red-500/20">🔴 LIVE {m.minute}'</span>
                                                    ) : (
                                                        <span className="bg-slate-950 text-slate-600 px-3 py-1 rounded-full text-[9px] font-black uppercase border border-slate-800">📅 UPCOMING</span>
                                                    )}
                                                </div>

                                                <div className="flex justify-between items-center mb-10 px-2">
                                                    <div className="text-center w-24">
                                                        <span className="text-4xl block mb-3 filter drop-shadow-lg">{COUNTRY_FLAGS[m.home] || '🏳️'}</span>
                                                        <span className="text-[10px] font-black text-slate-100 uppercase truncate block tracking-tighter">{m.home}</span>
                                                        {adminMode && (
                                                            <div className="flex justify-center gap-1 mt-2">
                                                                <button onClick={() => updateMatchScore(m.id, 'home', -1)} className="w-6 h-6 bg-amber-500/20 text-amber-500 rounded-md font-black text-xs hover:bg-amber-500 hover:text-slate-950">-</button>
                                                                <button onClick={() => updateMatchScore(m.id, 'home', 1)} className="w-6 h-6 bg-amber-500/20 text-amber-500 rounded-md font-black text-xs hover:bg-amber-500 hover:text-slate-950">+</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="text-center">
                                                        {(m.completed || isLive) ? (
                                                            <div className="text-4xl font-black flex items-center gap-3">
                                                                <span className={m.completed ? 'text-white' : 'text-emerald-400'}>{m.homeScore}</span>
                                                                <span className="text-slate-800/50 text-2xl">:</span>
                                                                <span className={m.completed ? 'text-white' : 'text-emerald-400'}>{m.awayScore}</span>
                                                            </div>
                                                        ) : <div className="text-[10px] font-black text-slate-800 bg-slate-900/50 px-3 py-1 rounded-full">VS</div>}
                                                    </div>
                                                    <div className="text-center w-24">
                                                        <span className="text-4xl block mb-3 filter drop-shadow-lg">{COUNTRY_FLAGS[m.away] || '🏳️'}</span>
                                                        <span className="text-[10px] font-black text-slate-100 uppercase truncate block tracking-tighter">{m.away}</span>
                                                        {adminMode && (
                                                            <div className="flex justify-center gap-1 mt-2">
                                                                <button onClick={() => updateMatchScore(m.id, 'away', -1)} className="w-6 h-6 bg-amber-500/20 text-amber-500 rounded-md font-black text-xs hover:bg-amber-500 hover:text-slate-950">-</button>
                                                                <button onClick={() => updateMatchScore(m.id, 'away', 1)} className="w-6 h-6 bg-amber-500/20 text-amber-500 rounded-md font-black text-xs hover:bg-amber-500 hover:text-slate-950">+</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="bg-slate-950/80 p-4 rounded-[1.5rem] border border-slate-800/60 flex justify-between items-center shadow-inner">
                                                    <div className="flex items-center gap-2">
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'home', -1)} className="w-9 h-9 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors disabled:opacity-30">-</button>
                                                        <span className="w-5 text-center font-black text-emerald-400 text-lg tabular-nums">{p.homePredict}</span>
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'home', 1)} className="w-9 h-9 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors disabled:opacity-30">+</button>
                                                    </div>
                                                    <div className="text-[8px] font-black text-slate-600 uppercase tracking-widest">Prediction</div>
                                                    <div className="flex items-center gap-2">
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'away', -1)} className="w-9 h-9 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors disabled:opacity-30">-</button>
                                                        <span className="w-5 text-center font-black text-emerald-400 text-lg tabular-nums">{p.awayPredict}</span>
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'away', 1)} className="w-9 h-9 bg-slate-800 hover:bg-slate-700 rounded-xl font-black transition-colors disabled:opacity-30">+</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="glass-card rounded-[3rem] overflow-hidden border-slate-800 animate-in">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-900 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                        <tr>
                                            <th className="p-8">Rank</th>
                                            <th>User</th>
                                            <th className="text-center p-8">Total Points</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/30">
                                        {leaderboard.map((l, i) => (
                                            <tr key={l.uid} className={`transition-colors ${l.uid === user?.uid ? 'bg-emerald-500/5' : 'hover:bg-slate-900/40'}`}>
                                                <td className="p-8 font-black text-slate-600 tabular-nums">#{i + 1}</td>
                                                <td className="py-8 font-bold text-slate-200 flex items-center gap-3">
                                                    {l.displayName}
                                                    {l.uid === user?.uid && <span className="text-[8px] bg-emerald-500 text-slate-950 px-2.5 py-0.5 rounded-full font-black uppercase">You</span>}
                                                </td>
                                                <td className="text-center p-8">
                                                    <span className="text-2xl font-black text-emerald-400 tabular-nums">{l.points}</span>
                                                    <span className="text-[10px] text-emerald-900 font-black ml-1 uppercase">Pts</span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {leaderboard.length === 0 && <div className="p-20 text-center text-slate-600 font-bold uppercase tracking-widest text-xs">No active players yet</div>}
                            </div>
                        )}
                    </div>
                )}

                <footer className="py-12 text-center space-y-2">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC2026 Predictor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
    const firebaseConfig = {
        apiKey: "AIzaSyC2Sr5IcLU9p2HopvBvOFlsBRGZtB1y9NE",
        authDomain: "pcc2026wc.firebaseapp.com",
        databaseURL: "https://pcc2026wc-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "pcc2026wc",
        storageBucket: "pcc2026wc.firebasestorage.app",
        messagingSenderId: "435446315061",
        appId: "1:435446315061:web:ab2b76edfb08e8ee6b997c"
    };

    const API_TOKEN = "5c19fe248b844cf6b7673905997c9ad4";
    // PASTE YOUR UID HERE:
    const ADMIN_UID = "mJFQl94QpgMzbfi07u2EStaxDJZ2"; 
    const appId = "my-world-cup-predictor-2026";

    const COUNTRY_FLAGS = {
        "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czech Republic": "🇨🇿",
        "Canada": "🇨🇦", "Bosnia": "🇧🇦", "Qatar": "🇶🇦", "Switzerland": "🇨🇭",
        "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Haiti": "🇭🇹", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "USA": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turkey": "🇹🇷",
        "Germany": "🇩🇪", "Curaçao": "🇨🇼", "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨",
        "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳",
        "Belgium": "🇧🇪", "Egypt": "🇪🇬", "Iran": "🇮🇷", "New Zealand": "🇳🇿",
        "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾"
    };

    const GROUPS_TEAMS = {
        A: ["Mexico", "South Africa", "South Korea", "Czech Republic"],
        B: ["Canada", "Bosnia", "Qatar", "Switzerland"],
        C: ["Brazil", "Morocco", "Haiti", "Scotland"],
        D: ["USA", "Paraguay", "Australia", "Turkey"],
        E: ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
        F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
        G: ["Belgium", "Egypt", "Iran", "New Zealand"],
        H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function App() {
        const [user, setUser] = React.useState(null);
        const [authLoading, setAuthLoading] = React.useState(true);
        const [authView, setAuthView] = React.useState('login');
        const [username, setUsername] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [matches, setMatches] = React.useState([]);
        const [predictions, setPredictions] = React.useState([]);
        const [users, setUsers] = React.useState([]);
        const [adminMode, setAdminMode] = React.useState(false);
        const [syncStatus, setSyncStatus] = React.useState('');

        React.useEffect(() => {
            auth.onAuthStateChanged(u => {
                setUser(u);
                setAuthLoading(false);
            });
            db.ref(`artifacts/${appId}/public/data/matches`).on('value', snap => setMatches(Object.keys(snap.val() || {}).map(k => ({ ...snap.val()[k], id: k }))));
            db.ref(`artifacts/${appId}/public/data/predictions`).on('value', snap => setPredictions(Object.keys(snap.val() || {}).map(k => ({ ...snap.val()[k], id: k }))));
            db.ref(`artifacts/${appId}/public/data/users`).on('value', snap => setUsers(Object.values(snap.val() || {})));
        }, []);

        const seedMatches = () => {
            const matches = {};
            Object.keys(GROUPS_TEAMS).forEach(g => {
                const teams = GROUPS_TEAMS[g];
                const groupMatches = [
                    { home: teams[0], away: teams[1], date: "June 11" },
                    { home: teams[2], away: teams[3], date: "June 14" }, 
                    { home: teams[0], away: teams[2], date: "June 15" },
                    { home: teams[1], away: teams[3], date: "June 16" },
                    { home: teams[3], away: teams[0], date: "June 20" },
                    { home: teams[1], away: teams[2], date: "June 21" }
                ];
                groupMatches.forEach((m, i) => matches[`g_${g}_${i}`] = { ...m, group: g, homeScore: 0, awayScore: 0, completed: false });
            });
            db.ref(`artifacts/${appId}/public/data/matches`).set(matches);
        };

        const updateMatch = (id, field, val) => db.ref(`artifacts/${appId}/public/data/matches/${id}`).update({ [field]: val });

        const manualSync = async () => {
            setSyncStatus('🛰️ Requesting Data...');
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.football-data.org/v4/competitions/WC/matches')}`, {
                    headers: { 'X-Auth-Token': API_TOKEN }
                });
                const data = await response.json();
                setSyncStatus('✅ Sync Successful');
            } catch (err) {
                setSyncStatus('❌ Sync Failed');
            }
        };

        const handleAuth = async (e) => {
            e.preventDefault();
            try {
                if (authView === 'login') await auth.signInWithEmailAndPassword(`${username}@wc.com`, password);
                else {
                    await auth.createUserWithEmailAndPassword(`${username}@wc.com`, password);
                    await db.ref(`artifacts/${appId}/public/data/users/${auth.currentUser.uid}`).set({ name: username });
                }
            } catch (err) { alert(err.message); }
        };

        if (authLoading) return <div className="p-4">Loading...</div>;
        if (!user) return (
            <div className="max-w-md mx-auto p-10 glass-card rounded-3xl mt-20">
                <h2 className="text-2xl font-black mb-6 text-emerald-400">{authView === 'login' ? 'LOGIN' : 'REGISTER'}</h2>
                <form onSubmit={handleAuth} className="space-y-4">
                    <input className="w-full bg-slate-800 p-3 rounded-xl" placeholder="Username" onChange={e => setUsername(e.target.value)} />
                    <input className="w-full bg-slate-800 p-3 rounded-xl" type="password" placeholder="Password" onChange={e => setPassword(e.target.value)} />
                    <button className="w-full bg-emerald-500 p-3 rounded-xl font-bold">SUBMIT</button>
                </form>
                <p className="mt-4 text-xs text-slate-500 cursor-pointer underline" onClick={() => setAuthView(authView === 'login' ? 'reg' : 'login')}>Toggle Login/Register</p>
            </div>
        );

        return (
            <div className="max-w-4xl mx-auto p-4">
                <header className="flex justify-between items-center glass-card p-6 rounded-3xl mb-6">
                    <div>
                        <h1 className="font-black text-emerald-400">WC PREDICTOR 2026</h1>
                        <p className="text-[10px] text-slate-500">UID: {user.uid}</p>
                    </div>
                    <div className="flex gap-4">
                        {user?.uid === ADMIN_UID && <button onClick={() => setAdminMode(!adminMode)} className="bg-amber-500 text-black px-4 py-2 rounded-xl font-bold">⚙️</button>}
                        <button onClick={() => auth.signOut()} className="text-sm font-bold">Logout</button>
                    </div>
                </header>

                {adminMode && (
                    <div className="glass-card p-6 mb-6 rounded-3xl space-y-4">
                        <div className="flex justify-between items-center">
                            <h2 className="font-bold">ADMIN HUB</h2>
                            <button onClick={manualSync} className="bg-amber-500 text-black px-4 py-2 rounded-xl font-bold">FORCE API SYNC</button>
                        </div>
                        <p className="text-xs text-amber-400">{syncStatus}</p>
                        <button onClick={seedMatches} className="bg-red-500 text-white px-4 py-2 rounded-xl text-sm w-full font-bold">Reset All Matches</button>
                    </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {matches.map(m => (
                        <div key={m.id} className="glass-card p-4 rounded-2xl">
                            <div className="flex justify-between items-center mb-2">
                                <p className="text-xs font-bold text-slate-400">{m.date} - Group {m.group}</p>
                                {m.completed && <span className="bg-emerald-500 text-[10px] px-2 py-0.5 rounded-full font-bold">FT</span>}
                            </div>
                            <div className="flex justify-between items-center my-4">
                                <span className="text-2xl">{COUNTRY_FLAGS[m.home] || '🏳️'}</span>
                                <div className="flex items-center gap-2">
                                    {adminMode ? (
                                        <>
                                            <button onClick={() => updateMatch(m.id, 'homeScore', Math.max(0, m.homeScore - 1))} className="bg-slate-800 px-2 rounded">-</button>
                                            <span className="w-8 text-center text-emerald-400 font-bold">{m.homeScore}</span>
                                            <button onClick={() => updateMatch(m.id, 'homeScore', m.homeScore + 1)} className="bg-slate-800 px-2 rounded">+</button>
                                        </>
                                    ) : (
                                        <span className="text-xl font-bold">{m.homeScore}</span>
                                    )}
                                    <span className="text-slate-600">:</span>
                                    {adminMode ? (
                                        <>
                                            <button onClick={() => updateMatch(m.id, 'awayScore', Math.max(0, m.awayScore - 1))} className="bg-slate-800 px-2 rounded">-</button>
                                            <span className="w-8 text-center text-emerald-400 font-bold">{m.awayScore}</span>
                                            <button onClick={() => updateMatch(m.id, 'awayScore', m.awayScore + 1)} className="bg-slate-800 px-2 rounded">+</button>
                                        </>
                                    ) : (
                                        <span className="text-xl font-bold">{m.awayScore}</span>
                                    )}
                                </div>
                                <span className="text-2xl">{COUNTRY_FLAGS[m.away] || '🏳️'}</span>
                            </div>
                            {adminMode && <button onClick={() => updateMatch(m.id, 'completed', !m.completed)} className={`w-full rounded py-1 font-bold ${m.completed ? 'bg-slate-800' : 'bg-emerald-500'}`}>{m.completed ? 'Re-open Match' : 'Mark Finished'}</button>}
                        </div>
                    ))}
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>

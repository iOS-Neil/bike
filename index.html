<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC2026 Predictor Pro | Live API Sync</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .live-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const firebaseConfig = {
        apiKey: "AIzaSyC2Sr5IcLU9p2HopvBvOFlsBRGZtB1y9NE",
        authDomain: "pcc2026wc.firebaseapp.com",
        databaseURL: "https://pcc2026wc-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "pcc2026wc",
        storageBucket: "pcc2026wc.firebasestorage.app",
        messagingSenderId: "435446315061",
        appId: "1:435446315061:web:ab2b76edfb08e8ee6b997c"
    };

    const API_TOKEN = "5c19fe248b844cf6b7673905997c9ad4";
    const ADMIN_UID = "mJFQl94QpgMzbfi07u2EStaxDJZ2"; 
    const appId = "my-world-cup-predictor-2026";

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const COUNTRY_FLAGS = {
        "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czech Republic": "🇨🇿",
        "Canada": "🇨🇦", "Bosnia": "🇧🇦", "Qatar": "🇶🇦", "Switzerland": "🇨🇭",
        "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Haiti": "🇭🇹", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "USA": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turkey": "🇹🇷",
        "Germany": "🇩🇪", "Curaçao": "🇨🇼", "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨",
        "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳",
        "Belgium": "🇧🇪", "Egypt": "🇪🇬", "Iran": "🇮🇷", "New Zealand": "🇳🇿",
        "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾", "TBD": "🏳️"
    };

    const GROUPS_TEAMS = {
        A: ["Mexico", "South Africa", "South Korea", "Czech Republic"],
        B: ["Canada", "Bosnia", "Qatar", "Switzerland"],
        C: ["Brazil", "Morocco", "Haiti", "Scotland"],
        D: ["USA", "Paraguay", "Australia", "Turkey"],
        E: ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
        F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
        G: ["Belgium", "Egypt", "Iran", "New Zealand"],
        H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
    };

    function App() {
        const [user, setUser] = React.useState(null);
        const [authView, setAuthView] = React.useState('login'); 
        const [authLoading, setAuthLoading] = React.useState(true);
        const [matches, setMatches] = React.useState([]);
        const [predictions, setPredictions] = React.useState([]);
        const [users, setUsers] = React.useState([]);
        const [activeTab, setActiveTab] = React.useState('predictions');
        const [activeGroup, setActiveGroup] = React.useState('A');
        const [adminMode, setAdminMode] = React.useState(false);
        const [syncStatus, setSyncStatus] = React.useState('Idle');
        const [lastSyncTime, setLastSyncTime] = React.useState(0);

        React.useEffect(() => {
            auth.onAuthStateChanged(u => {
                setUser(u);
                setAuthLoading(false);
                if (u) setAuthView('none');
            });

            db.ref(`artifacts/${appId}/public/data/matches`).on('value', snap => {
                const data = snap.val() || {};
                const list = Object.keys(data).map(k => ({ ...data[k], id: k }));
                setMatches(list);
                attemptAutoSync(list);
            });

            db.ref(`artifacts/${appId}/public/data/predictions`).on('value', snap => {
                const data = snap.val() || {};
                setPredictions(Object.keys(data).map(k => ({ ...data[k], id: k })));
            });

            db.ref(`artifacts/${appId}/public/data/users`).on('value', snap => {
                const data = snap.val() || {};
                setUsers(Object.values(data));
            });
        }, []);

        const attemptAutoSync = async (currentMatches) => {
            const now = Date.now();
            // Max 1 sync check every 5 minutes
            if (now - lastSyncTime < 300000) return; 
            setLastSyncTime(now);
            await syncScoresFromAPI(currentMatches);
        };

        const syncScoresFromAPI = async (currentMatches) => {
            if (!API_TOKEN) return;
            setSyncStatus('🛰️ Syncing Live Data...');
            
            try {
                // FIXED: Wrapped the API URL in a CORS proxy to prevent "Failed to fetch" errors
                const apiUrl = 'https://api.football-data.org/v4/competitions/WC/matches';
                const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
                
                const response = await fetch(proxiedUrl, {
                    method: 'GET',
                    headers: { 
                        'X-Auth-Token': API_TOKEN,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                
                if (data.matches) {
                    const updates = {};
                    data.matches.forEach(apiMatch => {
                        const dbMatch = currentMatches.find(m => 
                            (m.home === (apiMatch.homeTeam.shortName || apiMatch.homeTeam.name)) &&
                            (m.away === (apiMatch.awayTeam.shortName || apiMatch.awayTeam.name))
                        );

                        if (dbMatch) {
                            const apiStatus = apiMatch.status;
                            let newStatus = 'UPCOMING';
                            if (apiStatus === 'FINISHED') newStatus = 'FINISHED';
                            else if (['IN_PLAY', 'PAUSED'].includes(apiStatus)) newStatus = 'LIVE';

                            const hScore = apiMatch.score.fullTime.home ?? 0;
                            const aScore = apiMatch.score.fullTime.away ?? 0;

                            if (dbMatch.homeScore !== hScore || dbMatch.awayScore !== aScore || dbMatch.status !== newStatus) {
                                updates[`artifacts/${appId}/public/data/matches/${dbMatch.id}`] = {
                                    ...dbMatch,
                                    homeScore: hScore,
                                    awayScore: aScore,
                                    status: newStatus,
                                    completed: newStatus === 'FINISHED',
                                    minute: apiMatch.minute || ''
                                };
                            }
                        }
                    });

                    if (Object.keys(updates).length > 0) {
                        await db.ref().update(updates);
                        setSyncStatus('✅ Database Updated');
                    } else {
                        setSyncStatus('💤 Scores Current');
                    }
                }
            } catch (err) {
                console.error("Sync error:", err);
                setSyncStatus('❌ Sync Failed (CORS or API)');
            }
        };

        const leaderboard = React.useMemo(() => {
            return users
                .filter(u => !u.isAnonymous) 
                .map(u => {
                    let pts = 0;
                    predictions.filter(p => p.userId === u.uid).forEach(p => {
                        const m = matches.find(match => match.id === p.matchId);
                        if (m && m.completed) {
                            const actH = parseInt(m.homeScore);
                            const actA = parseInt(m.awayScore);
                            const prH = parseInt(p.homePredict);
                            const prA = parseInt(p.awayPredict);

                            if (actH === prH && actA === prA) pts += 5; 
                            else if ((actH > actA && prH > prA) || (actH < actA && prH < prA) || (actH === actA && prH === prA)) {
                                pts += 2; 
                            }
                        }
                    });
                    return { ...u, points: pts };
                }).sort((a, b) => b.points - a.points);
        }, [users, matches, predictions]);

        const updatePrediction = (matchId, team, change) => {
            if (!user) return;
            const predId = `${user.uid}_${matchId}`;
            const existing = predictions.find(p => p.id === predId) || { homePredict: 0, awayPredict: 0 };
            let h = parseInt(existing.homePredict) || 0;
            let a = parseInt(existing.awayPredict) || 0;
            if (team === 'home') h = Math.max(0, h + change);
            else a = Math.max(0, a + change);

            db.ref(`artifacts/${appId}/public/data/predictions/${predId}`).set({
                userId: user.uid, matchId, homePredict: h, awayPredict: a
            });
        };

        if (authLoading) return <div className="h-screen flex items-center justify-center text-emerald-500 font-black animate-pulse">CONNECTING...</div>;

        return (
            <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-6 animate-in">
                
                {/* HEADER */}
                <header className="glass-card p-6 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/20">🏆</div>
                        <div>
                            <h1 className="text-xl font-black text-emerald-400 uppercase tracking-tighter">WC Predictor 2026</h1>
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{syncStatus}</p>
                        </div>
                    </div>
                    
                    <div className="flex items-center gap-3">
                        {user ? (
                            <>
                                <div className="bg-slate-900 border border-slate-800 px-4 py-2 rounded-2xl text-center">
                                    <p className="text-[9px] font-black text-slate-500 uppercase">Points</p>
                                    <p className="text-emerald-400 font-black">{leaderboard.find(l => l.uid === user.uid)?.points || 0}</p>
                                </div>
                                {user.uid === ADMIN_UID && (
                                    <button onClick={() => setAdminMode(!adminMode)} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-all ${adminMode ? 'bg-amber-500 text-slate-900 border-amber-500' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>⚙️</button>
                                )}
                                <button onClick={() => auth.signOut()} className="text-[10px] text-slate-500 font-black hover:text-red-400 transition-colors uppercase">Logout</button>
                            </>
                        ) : (
                            <button onClick={() => setAuthView('login')} className="bg-emerald-500 text-slate-950 px-6 py-2 rounded-xl font-black text-xs uppercase">Join League</button>
                        )}
                    </div>
                </header>

                {/* ADMIN TOOLS */}
                {adminMode && (
                    <div className="bg-amber-500/10 border border-amber-500/20 p-6 rounded-[2rem] flex items-center gap-3">
                         <button onClick={() => syncScoresFromAPI(matches)} className="bg-amber-500 text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Force Live Sync</button>
                    </div>
                )}

                {/* MAIN CONTENT */}
                {authView !== 'none' ? (
                    <div className="glass-card p-12 rounded-[3rem] text-center space-y-6 max-w-sm mx-auto">
                        <h2 className="text-2xl font-black uppercase">{authView === 'login' ? 'Login' : 'Register'}</h2>
                        <form onSubmit={async (e) => {
                            e.preventDefault();
                            const email = e.target.email.value;
                            const pass = e.target.password.value;
                            try {
                                if (authView === 'register') {
                                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                                    await res.user.updateProfile({ displayName: e.target.display.value });
                                    await db.ref(`artifacts/${appId}/public/data/users/${res.user.uid}`).set({ uid: res.user.uid, displayName: e.target.display.value, isAnonymous: false });
                                } else {
                                    await auth.signInWithEmailAndPassword(email, pass);
                                }
                                setAuthView('none');
                            } catch (err) { console.error(err); }
                        }} className="space-y-3 text-slate-950">
                             {authView === 'register' && <input name="display" type="text" placeholder="Name" className="w-full rounded-xl px-4 py-3 text-sm font-bold" required />}
                             <input name="email" type="email" placeholder="Email" className="w-full rounded-xl px-4 py-3 text-sm font-bold" required />
                             <input name="password" type="password" placeholder="Password" className="w-full rounded-xl px-4 py-3 text-sm font-bold" required />
                             <button className="w-full bg-emerald-500 text-slate-950 py-3 rounded-xl font-black uppercase tracking-widest">Submit</button>
                             <button type="button" onClick={() => setAuthView(authView === 'login' ? 'register' : 'login')} className="text-[10px] text-slate-500 uppercase font-black">{authView === 'login' ? 'Register Account' : 'Login Account'}</button>
                        </form>
                    </div>
                ) : (
                    <div className="space-y-6">
                        <div className="bg-slate-900 p-1 rounded-2xl flex border border-slate-800">
                            <button onClick={() => setActiveTab('predictions')} className={`flex-1 py-3 text-xs font-black rounded-xl ${activeTab === 'predictions' ? 'bg-emerald-500 text-slate-950' : 'text-slate-500'}`}>MATCHES</button>
                            <button onClick={() => setActiveTab('leaderboard')} className={`flex-1 py-3 text-xs font-black rounded-xl ${activeTab === 'leaderboard' ? 'bg-emerald-500 text-slate-950' : 'text-slate-500'}`}>LEADERBOARD</button>
                        </div>

                        {activeTab === 'predictions' ? (
                            <div className="space-y-6">
                                <div className="flex overflow-x-auto gap-2 pb-2 scrollbar-hide justify-center">
                                    {Object.keys(GROUPS_TEAMS).map(g => (
                                        <button key={g} onClick={() => setActiveGroup(g)} className={`px-4 py-2 text-xs font-black rounded-lg border ${activeGroup === g ? 'bg-slate-800 text-emerald-400 border-emerald-500/40' : 'bg-slate-900/50 text-slate-600 border-transparent'}`}>GRP {g}</button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {matches.filter(m => m.group === activeGroup).map(m => {
                                        const p = predictions.find(pred => pred.matchId === m.id && pred.userId === user?.uid) || { homePredict: 0, awayPredict: 0 };
                                        const isLive = m.status === 'LIVE';
                                        return (
                                            <div key={m.id} className={`glass-card p-5 rounded-[2rem] border-slate-800 relative transition-all hover:scale-[1.01] ${isLive ? 'border-red-500/50 shadow-lg shadow-red-500/10' : ''}`}>
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">{m.date}</span>
                                                    {m.completed ? (
                                                        <span className="bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-[9px] font-black uppercase">Finished</span>
                                                    ) : isLive ? (
                                                        <span className="bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-[9px] font-black uppercase live-pulse">LIVE {m.minute}'</span>
                                                    ) : (
                                                        <span className="bg-slate-950 text-slate-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">Upcoming</span>
                                                    )}
                                                </div>

                                                <div className="flex justify-between items-center mb-8 px-2">
                                                    <div className="text-center w-24">
                                                        <span className="text-4xl block mb-2">{COUNTRY_FLAGS[m.home]}</span>
                                                        <span className="text-[10px] font-black text-slate-200 uppercase truncate block">{m.home}</span>
                                                    </div>
                                                    <div className="text-center">
                                                        {(m.completed || isLive) ? (
                                                            <div className="text-3xl font-black flex items-center gap-2">
                                                                <span className={m.completed ? 'text-white' : 'text-emerald-400'}>{m.homeScore}</span>
                                                                <span className="text-slate-800">:</span>
                                                                <span className={m.completed ? 'text-white' : 'text-emerald-400'}>{m.awayScore}</span>
                                                            </div>
                                                        ) : <div className="text-xs font-black text-slate-800">VS</div>}
                                                    </div>
                                                    <div className="text-center w-24">
                                                        <span className="text-4xl block mb-2">{COUNTRY_FLAGS[m.away]}</span>
                                                        <span className="text-[10px] font-black text-slate-200 uppercase truncate block">{m.away}</span>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-950/80 p-3 rounded-2xl border border-slate-800/60 flex justify-between items-center">
                                                    <div className="flex items-center gap-2">
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'home', -1)} className="w-8 h-8 bg-slate-800 rounded-xl font-black">-</button>
                                                        <span className="w-4 text-center font-black text-emerald-400">{p.homePredict}</span>
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'home', 1)} className="w-8 h-8 bg-slate-800 rounded-xl font-black">+</button>
                                                    </div>
                                                    <div className="text-[8px] font-black text-slate-500 uppercase">My Predict</div>
                                                    <div className="flex items-center gap-2">
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'away', -1)} className="w-8 h-8 bg-slate-800 rounded-xl font-black">-</button>
                                                        <span className="w-4 text-center font-black text-emerald-400">{p.awayPredict}</span>
                                                        <button disabled={m.completed || isLive} onClick={() => updatePrediction(m.id, 'away', 1)} className="w-8 h-8 bg-slate-800 rounded-xl font-black">+</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="glass-card rounded-[2.5rem] overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-800/30 text-[10px] font-black text-slate-500 uppercase">
                                        <tr><th className="p-6">Rank</th><th>User</th><th className="text-center p-6">Total Pts</th></tr>
                                    </thead>
                                    <tbody>
                                        {leaderboard.map((l, i) => (
                                            <tr key={l.uid} className={`border-b border-slate-800/20 ${l.uid === user?.uid ? 'bg-emerald-500/5' : ''}`}>
                                                <td className="p-6 font-black text-slate-600">#{i + 1}</td>
                                                <td className="py-6 font-bold text-slate-100 flex items-center gap-2">
                                                    {l.displayName}
                                                    {l.uid === user?.uid && <span className="text-[8px] bg-emerald-500 text-slate-950 px-2 rounded-full font-black">YOU</span>}
                                                </td>
                                                <td className="text-center p-6 font-black text-emerald-400 text-2xl">{l.points}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                )}

                <footer className="py-8 text-center text-[10px] font-black text-slate-700 uppercase tracking-widest">
                    Live Scoreboard Sync Engine &copy; 2026
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>

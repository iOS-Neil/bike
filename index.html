<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor Pro</title>
    
    <!-- Scripts for React, Tailwind, and Firebase (Compat version) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for a premium look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-emerald-500 selection:text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
    const firebaseConfig = {
        apiKey: "AIzaSyC2Sr5IcLU9p2HopvBvOFlsBRGZtB1y9NE",
        authDomain: "pcc2026wc.firebaseapp.com",
        databaseURL: "https://pcc2026wc-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "pcc2026wc",
        storageBucket: "pcc2026wc.firebasestorage.app",
        messagingSenderId: "435446315061",
        appId: "1:435446315061:web:ab2b76edfb08e8ee6b997c"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.database();
    const appId = "my-world-cup-predictor-2026";

    // PASTE YOUR UID HERE after you register to lock the admin panel to just you
    const ADMIN_UID = "YOUR_ADMIN_UID_HERE"; 

    const COUNTRY_FLAGS = {
        "Mexico": "🇲🇽", "South Africa": "🇿🇦", "South Korea": "🇰🇷", "Czech Republic": "🇨🇿",
        "Canada": "🇨🇦", "Bosnia": "🇧🇦", "Qatar": "🇶🇦", "Switzerland": "🇨🇭",
        "Brazil": "🇧🇷", "Morocco": "🇲🇦", "Haiti": "🇭🇹", "Scotland": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
        "USA": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turkey": "🇹🇷",
        "Germany": "🇩🇪", "Curaçao": "🇨🇼", "Ivory Coast": "🇨🇮", "Ecuador": "🇪🇨",
        "Netherlands": "🇳🇱", "Japan": "🇯🇵", "Sweden": "🇸🇪", "Tunisia": "🇹🇳",
        "Belgium": "🇧🇪", "Egypt": "🇪🇬", "Iran": "🇮🇷", "New Zealand": "🇳🇿",
        "Spain": "🇪🇸", "Cape Verde": "🇨🇻", "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾", "TBD": "🏳️"
    };

    const GROUPS_TEAMS = {
        A: ["Mexico", "South Africa", "South Korea", "Czech Republic"],
        B: ["Canada", "Bosnia", "Qatar", "Switzerland"],
        C: ["Brazil", "Morocco", "Haiti", "Scotland"],
        D: ["USA", "Paraguay", "Australia", "Turkey"],
        E: ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
        F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
        G: ["Belgium", "Egypt", "Iran", "New Zealand"],
        H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"]
    };

    function App() {
        const [user, setUser] = React.useState(null);
        const [authView, setAuthView] = React.useState('login'); // 'login' | 'register' | 'none'
        const [authLoading, setAuthLoading] = React.useState(true);
        const [authError, setAuthError] = React.useState(null);

        const [matches, setMatches] = React.useState([]);
        const [predictions, setPredictions] = React.useState([]);
        const [users, setUsers] = React.useState([]);
        const [tournamentState, setTournamentState] = React.useState({ currentStage: 'group' });

        const [activeTab, setActiveTab] = React.useState('predictions');
        const [activeGroup, setActiveGroup] = React.useState('A');
        const [adminMode, setAdminMode] = React.useState(false);

        // Inputs for login/register
        const [email, setEmail] = React.useState('');
        const [password, setPassword] = React.useState('');
        const [displayName, setDisplayName] = React.useState('');

        React.useEffect(() => {
            auth.onAuthStateChanged(async (u) => {
                setUser(u);
                setAuthLoading(false);
                if (u) {
                    const userRef = db.ref(`artifacts/${appId}/public/data/users/${u.uid}`);
                    userRef.update({
                        uid: u.uid,
                        displayName: u.displayName || email.split('@')[0],
                        isAnonymous: false,
                        lastActive: new Date().toISOString()
                    });
                }
            });

            // Listen for matches
            db.ref(`artifacts/${appId}/public/data/matches`).on('value', snap => {
                const data = snap.val() || {};
                setMatches(Object.keys(data).map(k => ({ ...data[k], id: k })));
            });

            // Listen for predictions
            db.ref(`artifacts/${appId}/public/data/predictions`).on('value', snap => {
                const data = snap.val() || {};
                setPredictions(Object.keys(data).map(k => ({ ...data[k], id: k })));
            });

            // Listen for users
            db.ref(`artifacts/${appId}/public/data/users`).on('value', snap => {
                const data = snap.val() || {};
                setUsers(Object.values(data));
            });
        }, [email]);

        const handleAuth = async (e) => {
            e.preventDefault();
            setAuthError(null);
            try {
                if (authView === 'register') {
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    await res.user.updateProfile({ displayName: displayName });
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
                setAuthView('none');
            } catch (err) {
                setAuthError(err.message);
            }
        };

        const updatePrediction = (matchId, team, change) => {
            if (!user) return;
            const predId = `${user.uid}_${matchId}`;
            const existing = predictions.find(p => p.id === predId) || { homePredict: 0, awayPredict: 0 };
            let h = existing.homePredict;
            let a = existing.awayPredict;
            if (team === 'home') h = Math.max(0, h + change);
            else a = Math.max(0, a + change);

            db.ref(`artifacts/${appId}/public/data/predictions/${predId}`).set({
                userId: user.uid, matchId, homePredict: h, awayPredict: a
            });
        };

        const leaderboard = React.useMemo(() => {
            return users
                .filter(u => !u.isAnonymous)
                .map(u => {
                    let pts = 0, exact = 0;
                    predictions.filter(p => p.userId === u.uid).forEach(p => {
                        const m = matches.find(match => match.id === p.matchId);
                        if (m && m.completed) {
                            if (m.homeScore === p.homePredict && m.awayScore === p.awayPredict) {
                                pts += 5; exact++;
                            } else {
                                const mRes = m.homeScore > m.awayScore ? 'H' : m.homeScore < m.awayScore ? 'A' : 'D';
                                const pRes = p.homePredict > p.awayPredict ? 'H' : p.homePredict < p.awayPredict ? 'A' : 'D';
                                if (mRes === pRes) pts += 2;
                            }
                        }
                    });
                    return { ...u, points: pts, exact };
                }).sort((a, b) => b.points - a.points || b.exact - a.exact);
        }, [users, matches, predictions]);

        const userStats = React.useMemo(() => {
            const idx = leaderboard.findIndex(l => l.uid === user?.uid);
            const data = leaderboard[idx];
            return { rank: idx === -1 ? '-' : idx + 1, points: data?.points || 0 };
        }, [leaderboard, user]);

        if (authLoading) return <div className="flex h-screen items-center justify-center text-emerald-500 font-black tracking-tighter text-2xl animate-pulse">LOADING ENGINE...</div>;

        return (
            <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-8 animate-in">
                
                {/* HEADER */}
                <header className="flex flex-col md:flex-row justify-between items-center gap-6 bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-800 backdrop-blur-xl">
                    <div className="text-center md:text-left">
                        <h1 className="text-2xl font-black bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent uppercase tracking-tight">World Cup 2026</h1>
                        <p className="text-[10px] font-bold text-slate-500 tracking-[0.3em] uppercase">Predictor Pro</p>
                    </div>
                    
                    <div className="flex items-center gap-4">
                        {user ? (
                            <>
                                <div className="bg-slate-950 px-5 py-2 rounded-2xl border border-slate-800 text-center shadow-inner">
                                    <p className="text-[9px] font-black text-slate-500 uppercase">Rank</p>
                                    <p className="text-amber-400 font-black">#{userStats.rank}</p>
                                </div>
                                <div className="bg-slate-950 px-5 py-2 rounded-2xl border border-slate-800 text-center shadow-inner">
                                    <p className="text-[9px] font-black text-slate-500 uppercase">Points</p>
                                    <p className="text-emerald-400 font-black">{userStats.points}</p>
                                </div>
                                {(user.uid === ADMIN_UID || user.email === 'admin@wc.local') && (
                                    <button onClick={() => setAdminMode(!adminMode)} className={`w-10 h-10 rounded-2xl border flex items-center justify-center transition-all ${adminMode ? 'bg-amber-500/20 border-amber-500/50 text-amber-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>⚙️</button>
                                )}
                                <button onClick={() => auth.signOut()} className="bg-slate-800 text-slate-400 px-4 py-2 rounded-2xl font-black text-xs uppercase border border-slate-700 hover:text-white transition-colors">Logout</button>
                            </>
                        ) : (
                            <button onClick={() => setAuthView('login')} className="bg-emerald-500 text-slate-950 px-6 py-2 rounded-2xl font-black text-xs uppercase shadow-lg shadow-emerald-500/20 hover:scale-105 transition-transform">Login / Register</button>
                        )}
                    </div>
                </header>

                {/* ADMIN TOOLS */}
                {adminMode && (
                    <div className="bg-amber-500/10 border border-amber-500/20 p-6 rounded-[2.5rem] flex flex-wrap gap-4 items-center">
                        <p className="text-amber-400 font-black text-xs uppercase w-full mb-2">Admin Simulator</p>
                        <button onClick={() => {
                            matches.forEach(m => {
                                const h = Math.floor(Math.random() * 4);
                                const a = Math.floor(Math.random() * 4);
                                db.ref(`artifacts/${appId}/public/data/matches/${m.id}`).update({ homeScore: h, awayScore: a, completed: true });
                            });
                        }} className="bg-amber-500 text-slate-950 px-4 py-2 rounded-xl text-[10px] font-black uppercase">⚡ Simulate All Scores</button>
                        <button onClick={() => {
                             if(confirm("Reset Tournament?")) db.ref(`artifacts/${appId}/public/data`).remove();
                        }} className="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Reset Database</button>
                    </div>
                )}

                {/* MAIN CONTENT */}
                {!user ? (
                    <div className="bg-slate-900/50 border border-slate-800 p-16 rounded-[3rem] text-center space-y-6">
                        <span className="text-6xl block">🔒</span>
                        <h2 className="text-2xl font-black uppercase tracking-tight">Predictions Locked</h2>
                        <p className="text-slate-500 text-sm max-w-sm mx-auto leading-relaxed">Join the tournament to predict scores, earn points, and climb the leaderboard. Register your account to start!</p>
                        <div className="flex justify-center gap-4">
                             <button onClick={() => setAuthView('register')} className="bg-emerald-500 text-slate-950 px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-emerald-400 transition-colors">Create Account</button>
                             <button onClick={() => setAuthView('login')} className="bg-slate-800 text-slate-300 px-8 py-3 rounded-2xl font-black text-xs uppercase border border-slate-700">Sign In</button>
                        </div>
                    </div>
                ) : (
                    <div className="space-y-6">
                        {/* TABS */}
                        <div className="bg-slate-900 p-1.5 rounded-2xl flex border border-slate-800 shadow-xl">
                            <button onClick={() => setActiveTab('predictions')} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === 'predictions' ? 'bg-emerald-500 text-slate-950' : 'text-slate-500 hover:text-slate-300'}`}>PREDICTIONS</button>
                            <button onClick={() => setActiveTab('leaderboard')} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === 'leaderboard' ? 'bg-emerald-500 text-slate-950' : 'text-slate-500 hover:text-slate-300'}`}>LEADERBOARD</button>
                        </div>

                        {activeTab === 'predictions' ? (
                            <div className="space-y-8">
                                <div className="flex flex-wrap gap-2 justify-center">
                                    {Object.keys(GROUPS_TEAMS).map(g => (
                                        <button key={g} onClick={() => setActiveGroup(g)} className={`w-12 h-10 text-[10px] font-black rounded-xl border transition-all ${activeGroup === g ? 'bg-slate-800 text-emerald-400 border-emerald-500/30 shadow-lg' : 'bg-slate-900/50 text-slate-600 border-transparent'}`}>{g}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {matches.filter(m => m.group === activeGroup).map(m => {
                                        const p = predictions.find(pred => pred.matchId === m.id && pred.userId === user?.uid) || { homePredict: 0, awayPredict: 0 };
                                        return (
                                            <div key={m.id} className="bg-slate-900/80 p-6 rounded-[2rem] border border-slate-800/80 shadow-2xl hover:border-slate-700 transition-all">
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="text-[10px] font-black text-slate-600 uppercase tracking-widest">{m.date}</span>
                                                    {m.completed && <span className="bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-[9px] font-black uppercase">Final</span>}
                                                </div>
                                                <div className="flex justify-between items-center mb-8 px-2">
                                                    <div className="text-center w-20">
                                                        <span className="text-3xl block mb-2">{COUNTRY_FLAGS[m.home]}</span>
                                                        <span className="text-[10px] font-black text-slate-300 uppercase truncate block">{m.home}</span>
                                                    </div>
                                                    <div className="font-black text-xl text-slate-700">VS</div>
                                                    <div className="text-center w-20">
                                                        <span className="text-3xl block mb-2">{COUNTRY_FLAGS[m.away]}</span>
                                                        <span className="text-[10px] font-black text-slate-300 uppercase truncate block">{m.away}</span>
                                                    </div>
                                                </div>
                                                <div className="bg-slate-950 p-4 rounded-3xl border border-slate-800 flex justify-between items-center shadow-inner">
                                                    <div className="flex items-center gap-3">
                                                        <button disabled={m.completed} onClick={() => updatePrediction(m.id, 'home', -1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black disabled:opacity-30">-</button>
                                                        <span className="w-4 text-center font-black text-emerald-400">{p.homePredict}</span>
                                                        <button disabled={m.completed} onClick={() => updatePrediction(m.id, 'home', 1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black disabled:opacity-30">+</button>
                                                    </div>
                                                    <div className="flex items-center gap-3">
                                                        <button disabled={m.completed} onClick={() => updatePrediction(m.id, 'away', -1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black disabled:opacity-30">-</button>
                                                        <span className="w-4 text-center font-black text-emerald-400">{p.awayPredict}</span>
                                                        <button disabled={m.completed} onClick={() => updatePrediction(m.id, 'away', 1)} className="w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl font-black disabled:opacity-30">+</button>
                                                    </div>
                                                </div>
                                                {m.completed && (
                                                    <div className="mt-4 text-center">
                                                        <p className="text-[10px] font-black text-slate-500 uppercase mb-1">Result</p>
                                                        <div className="text-white font-black text-lg">{m.homeScore} : {m.awayScore}</div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-800/50 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                        <tr><th className="p-6">Rank</th><th>Predictor</th><th className="text-center">Exact</th><th className="text-center p-6">Points</th></tr>
                                    </thead>
                                    <tbody>
                                        {leaderboard.map((l, i) => (
                                            <tr key={l.uid} className={`border-b border-slate-800/40 ${l.uid === user.uid ? 'bg-emerald-500/5' : ''}`}>
                                                <td className="p-6 font-black text-slate-600">#{i + 1}</td>
                                                <td className="py-6 font-bold text-slate-200">{l.displayName}</td>
                                                <td className="text-center font-bold text-slate-400">{l.exact}</td>
                                                <td className="text-center p-6 font-black text-emerald-400 text-xl">{l.points}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                )}

                {/* AUTH OVERLAY */}
                {authView !== 'none' && (
                    <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-sm flex items-center justify-center p-6 z-50">
                        <div className="bg-slate-900 border border-slate-800 w-full max-w-md p-10 rounded-[3rem] shadow-2xl space-y-8 animate-in relative">
                             <button onClick={() => setAuthView('none')} className="absolute top-6 right-8 text-slate-500 hover:text-white font-black text-xl">×</button>
                             <div className="text-center space-y-2">
                                <span className="text-4xl block">🏆</span>
                                <h2 className="text-2xl font-black uppercase tracking-tight">{authView === 'login' ? 'Welcome Back' : 'Join Tournament'}</h2>
                                <p className="text-slate-500 text-xs">{authView === 'login' ? 'Sign in to access your predictions' : 'Create your account to join the leaderboard'}</p>
                             </div>
                             {authError && <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-2xl text-xs text-red-400 font-bold text-center">{authError}</div>}
                             <form onSubmit={handleAuth} className="space-y-4">
                                {authView === 'register' && (
                                    <input type="text" placeholder="Your Name" value={displayName} onChange={e => setDisplayName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:border-emerald-500 outline-none" required />
                                )}
                                <input type="email" placeholder="Email Address" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:border-emerald-500 outline-none" required />
                                <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:border-emerald-500 outline-none" required />
                                <button type="submit" className="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-2xl uppercase text-xs tracking-widest shadow-xl shadow-emerald-500/20">{authView === 'login' ? 'Sign In' : 'Register Now'}</button>
                             </form>
                             <div className="text-center">
                                <button onClick={() => setAuthView(authView === 'login' ? 'register' : 'login')} className="text-[10px] font-black text-slate-500 uppercase hover:text-emerald-400 tracking-widest">{authView === 'login' ? "Don't have an account? Register" : "Already have an account? Sign In"}</button>
                             </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor Pro</title>
    
    <!-- Scripts for React, Tailwind, and Firebase (Compat version) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-emerald-500 selection:text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
    // ... existing firebaseConfig ...
    // PASTE YOUR UID HERE after you register your account to enable Admin mode for only you
    const ADMIN_UID = "YOUR_ADMIN_UID_HERE"; 

    function App() {
        const [user, setUser] = React.useState(null);
        // Change default view to 'login' to force authentication before access
        const [authView, setAuthView] = React.useState('login'); 
        const [authError, setAuthError] = React.useState(null);
        // ... existing state ...

        React.useEffect(() => {
            auth.onAuthStateChanged(async (u) => {
                setUser(u);
                if (u && !u.isAnonymous) {
                    setAuthView('welcome'); // Close auth overlay on success
                    const name = u.displayName || 'User';
                    db.ref(`artifacts/${appId}/public/data/users/${u.uid}`).update({
                        uid: u.uid, 
                        displayName: name, 
                        isAnonymous: false, 
                        lastActive: new Date().toISOString()
                    });
                } else if (!u) {
                    // Force login view if no user is active
                    setAuthView('login');
                }
            });
            // ... existing data listeners ...
        }, []);

        const leaderboard = React.useMemo(() => {
            // Filter out anonymous guests - only registered users allowed
            return users
                .filter(u => !u.isAnonymous) 
                .map(u => {
                    let pts = 0, exact = 0;
                    // ... existing point calculation logic ...
                    return { ...u, points: pts, exact };
                }).sort((a, b) => b.points - a.points || b.exact - a.exact);
        }, [users, matches, predictions]);

        // ... existing updatePrediction and simulateScores ...

        return (
            <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-8 animate-in">
                
                {}
                <header className="flex flex-col md:flex-row justify-between items-center gap-6 bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-800">
                    <div className="text-center md:text-left">
                        <h1 className="text-2xl font-black bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent uppercase tracking-tight">World Cup 2026</h1>
                        <p className="text-[10px] font-bold text-slate-500 tracking-[0.3em] uppercase">Predictor Pro</p>
                    </div>
                    
                    <div className="flex items-center gap-4">
                        {user && !user.isAnonymous && (
                            <>
                                <div className="bg-slate-950 px-5 py-2 rounded-2xl border border-slate-800 text-center">
                                    <p className="text-[9px] font-black text-slate-500 uppercase">Rank</p>
                                    <p className="text-amber-400 font-black">#{userStats.rank}</p>
                                </div>
                                <div className="bg-slate-950 px-5 py-2 rounded-2xl border border-slate-800 text-center">
                                    <p className="text-[9px] font-black text-slate-500 uppercase">Points</p>
                                    <p className="text-emerald-400 font-black">{userStats.points}</p>
                                </div>
                                {/* SECURE COG: Only visible if the UID matches yours */}
                                {(user.uid === ADMIN_UID || user.email === 'admin@wc.local') && (
                                    <button onClick={() => setAdminMode(!adminMode)} className={`w-10 h-10 rounded-2xl border flex items-center justify-center transition-all ${adminMode ? 'bg-amber-500/20 border-amber-500/50 text-amber-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`}>⚙️</button>
                                )}
                                <button onClick={() => auth.signOut()} className="bg-slate-800 text-slate-400 px-4 py-2 rounded-2xl font-black text-xs uppercase border border-slate-700 hover:text-white transition-colors">Logout</button>
                            </>
                        )}
                        {!user && (
                            <button onClick={() => setAuthView('login')} className="bg-emerald-500 text-slate-950 px-6 py-2 rounded-2xl font-black text-xs uppercase shadow-lg shadow-emerald-500/20">Login / Register</button>
                        )}
                    </div>
                </header>

                {/* ... existing Admin Mode section ... */}

                {}
                {!user || user.isAnonymous ? (
                    <div className="bg-slate-900/50 border border-slate-800 p-12 rounded-[3rem] text-center space-y-4">
                        <span className="text-5xl block">🔐</span>
                        <h2 className="text-xl font-black uppercase">Predictions Locked</h2>
                        <p className="text-slate-500 text-sm max-w-xs mx-auto">Please login or create an account to start predicting scores and join the leaderboard.</p>
                        <button onClick={() => setAuthView('register')} className="bg-emerald-500 text-slate-950 px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-xl">Create Account Now</button>
                    </div>
                ) : (
                    <>
                        {/* ... existing Tabs and Content Views (Predictions/Leaderboard) ... */}
                    </>
                )}

                {/* Auth Overlay stays the same but is now the primary entrance */}
                {/* ... existing Auth Overlay code ... */}
            </div>
        );
    }
    // ...
</script>
</body>
</html>
